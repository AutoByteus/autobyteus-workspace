name: Server Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.2.7 or v1.2.7-rc1)"
        required: false
        type: string
      release_ref:
        description: "Git ref to build from during manual dispatch (branch, tag, or SHA). Defaults to release_tag when omitted."
        required: false
        type: string
      image_name:
        description: "Docker image name override (default: autobyteus/autobyteus-server)"
        required: false
        type: string
      publish_zh:
        description: "Publish only the zh runtime variant during manual dispatch"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: server-docker-release-${{ github.event.inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  DEFAULT_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'autobyteus/autobyteus-server' }}

jobs:
  prepare-release:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
      image_name: ${{ steps.meta.outputs.image_name }}
      normalized_tag: ${{ steps.meta.outputs.normalized_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      variant_label: ${{ steps.meta.outputs.variant_label }}
      build_variant: ${{ steps.meta.outputs.build_variant }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Resolve publish metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          INPUT_RELEASE_REF: ${{ github.event.inputs.release_ref || '' }}
          INPUT_IMAGE_NAME: ${{ github.event.inputs.image_name || '' }}
          INPUT_PUBLISH_ZH: ${{ github.event.inputs.publish_zh || 'false' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_REF="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${INPUT_RELEASE_TAG}"
            if [[ -n "${INPUT_RELEASE_REF}" ]]; then
              RELEASE_REF="${INPUT_RELEASE_REF}"
            else
              RELEASE_REF="${INPUT_RELEASE_TAG}"
            fi
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "::error::release_tag is required for manual workflow dispatch."
            exit 1
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "::error::Invalid release tag '${RELEASE_TAG}'. Expected format like v1.2.7 or v1.2.7-rc1."
            exit 1
          fi

          IMAGE_NAME="${INPUT_IMAGE_NAME:-$DEFAULT_IMAGE_NAME}"
          NORMALIZED_TAG="${RELEASE_TAG#v}"
          IS_PRERELEASE="false"
          BUILD_VARIANT=""
          VARIANT_LABEL="default"
          VERSION_SUFFIX=""
          LATEST_TAG="latest"
          if [[ "${NORMALIZED_TAG}" == *-* ]]; then
            IS_PRERELEASE="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${INPUT_PUBLISH_ZH}" == "true" ]]; then
            BUILD_VARIANT="zh"
            VARIANT_LABEL="zh"
            VERSION_SUFFIX="-zh"
            LATEST_TAG="latest-zh"
          fi

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_ref=${RELEASE_REF}"
            echo "image_name=${IMAGE_NAME}"
            echo "normalized_tag=${NORMALIZED_TAG}"
            echo "is_prerelease=${IS_PRERELEASE}"
            echo "variant_label=${VARIANT_LABEL}"
            echo "build_variant=${BUILD_VARIANT}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${NORMALIZED_TAG}${VERSION_SUFFIX}"
            if [[ "${IS_PRERELEASE}" != "true" ]]; then
              echo "${IMAGE_NAME}:${LATEST_TAG}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize publish plan
        run: |
          {
            echo "### Server Docker publish plan"
            echo ""
            echo "Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "Release ref: \`${{ steps.meta.outputs.release_ref }}\`"
            echo "Image: \`${{ steps.meta.outputs.image_name }}\`"
            echo "Variant: \`${{ steps.meta.outputs.variant_label }}\`"
            echo "Prerelease: \`${{ steps.meta.outputs.is_prerelease }}\`"
            echo ""
            echo "Published tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "${GITHUB_STEP_SUMMARY}"

  build-and-push:
    name: Build And Push Server Image
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push default multi-arch image
        if: ${{ needs.prepare-release.outputs.build_variant == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: autobyteus-server-ts/docker/Dockerfile.monorepo
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=release-server-docker-default
          cache-to: type=gha,mode=max,scope=release-server-docker-default
          tags: ${{ needs.prepare-release.outputs.tags }}

      - name: Build and push zh multi-arch image
        if: ${{ needs.prepare-release.outputs.build_variant == 'zh' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: autobyteus-server-ts/docker/Dockerfile.monorepo
          build-args: |
            BASE_IMAGE_TAG=${{ needs.prepare-release.outputs.build_variant }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=release-server-docker-zh
          cache-to: type=gha,mode=max,scope=release-server-docker-zh
          tags: ${{ needs.prepare-release.outputs.tags }}

      - name: Publish summary
        run: |
          {
            echo "### Server Docker image published"
            echo ""
            echo "Image: \`${{ needs.prepare-release.outputs.image_name }}\`"
            echo "Release tag: \`${{ needs.prepare-release.outputs.release_tag }}\`"
            echo "Variant: \`${{ needs.prepare-release.outputs.variant_label }}\`"
            echo "Prerelease: \`${{ needs.prepare-release.outputs.is_prerelease }}\`"
            echo ""
            echo "Published tags:"
            echo "${{ needs.prepare-release.outputs.tags }}" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "${GITHUB_STEP_SUMMARY}"

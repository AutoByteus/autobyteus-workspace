name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to GitHub Releases"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish/update when publish_release is enabled (example: v1.1.11-rc1)"
        required: false
        type: string
      prerelease:
        description: "Mark manual-dispatch release as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      enforce_version: ${{ steps.meta.outputs.enforce_version }}
      release_sha: ${{ steps.sha.outputs.release_sha }}
    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_REF="${GITHUB_REF_NAME}"
            ENFORCE_VERSION="true"
            PRERELEASE="false"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            RELEASE_REF="${{ github.event.inputs.release_tag }}"
            ENFORCE_VERSION="true"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            RELEASE_TAG=""
            RELEASE_REF="${GITHUB_REF_NAME}"
            ENFORCE_VERSION="false"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "enforce_version=$ENFORCE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Validate desktop package version matches release tag
        if: ${{ steps.meta.outputs.enforce_version == 'true' }}
        run: |
          TAG_VERSION="${{ steps.meta.outputs.release_tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION="$(grep -m1 '"version"' autobyteus-web/package.json | sed -E 's/.*\"version\": \"([^\"]+)\".*/\1/')"
          echo "Release tag version: $TAG_VERSION"
          echo "Desktop package version: $PACKAGE_VERSION"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::autobyteus-web/package.json version ($PACKAGE_VERSION) must match release tag ($TAG_VERSION)."
            exit 1
          fi

      - name: Validate managed messaging release manifest matches release tag
        if: ${{ steps.meta.outputs.enforce_version == 'true' }}
        run: |
          node autobyteus-message-gateway/scripts/build-runtime-package.mjs \
            --check-release-manifest \
            --release-tag "${{ steps.meta.outputs.release_tag }}"

      - name: Resolve release commit SHA
        id: sha
        run: |
          RELEASE_SHA="$(git rev-list -n 1 "${{ steps.meta.outputs.release_ref }}")"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

  build-macos-arm64:
    name: Build macOS ARM64
    needs: prepare-release
    runs-on: macos-14
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python setuptools for node-gyp
        run: python3 -m pip install --user --break-system-packages --upgrade setuptools

      - name: Import Apple code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}

      - name: Build Electron macOS ARM64
        working-directory: autobyteus-web
        env:
          NO_TIMESTAMP: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
          PRISMA_CLI_BINARY_TARGETS: "darwin-arm64,debian-openssl-1.1.x,debian-openssl-3.0.x"
        run: |
          sudo launchctl limit maxfiles 65536 200000 || true
          ulimit -n 65536 || ulimit -n 10240 || true
          ulimit -Sn
          ulimit -Hn
          pnpm build:electron:mac -- --arm64

      - name: Verify bundled Prisma ARM64 engine target
        run: |
          ENGINES_DIR="$(find autobyteus-web/resources/server/node_modules -maxdepth 6 -type d -path '*/@prisma/engines' | head -n1)"
          test -n "$ENGINES_DIR"
          echo "Prisma engines dir: $ENGINES_DIR"
          test -f "$ENGINES_DIR/schema-engine-darwin-arm64"
          CLIENT_DIR="$(find autobyteus-web/resources/server/node_modules -maxdepth 10 -type d -path '*/node_modules/.prisma/client' | head -n1)"
          test -n "$CLIENT_DIR"
          echo "Prisma client dir: $CLIENT_DIR"
          test -f "$CLIENT_DIR/libquery_engine-darwin-arm64.dylib.node"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            autobyteus-web/electron-dist/*.dmg
            autobyteus-web/electron-dist/*.dmg.blockmap
            autobyteus-web/electron-dist/*.zip
            autobyteus-web/electron-dist/*.zip.blockmap
            autobyteus-web/electron-dist/latest-mac.yml
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS Intel x64
    needs: prepare-release
    runs-on: macos-14
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python setuptools for node-gyp
        run: python3 -m pip install --user --break-system-packages --upgrade setuptools

      - name: Import Apple code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}

      - name: Build Electron macOS Intel x64
        working-directory: autobyteus-web
        env:
          NO_TIMESTAMP: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
          PRISMA_CLI_BINARY_TARGETS: "darwin,debian-openssl-1.1.x,debian-openssl-3.0.x"
        run: |
          sudo launchctl limit maxfiles 65536 200000 || true
          ulimit -n 65536 || ulimit -n 10240 || true
          ulimit -Sn
          ulimit -Hn
          pnpm build:electron:mac -- --x64

      - name: Verify bundled Prisma x64 engine target
        run: |
          ENGINES_DIR="$(find autobyteus-web/resources/server/node_modules -maxdepth 6 -type d -path '*/@prisma/engines' | head -n1)"
          test -n "$ENGINES_DIR"
          echo "Prisma engines dir: $ENGINES_DIR"
          test -f "$ENGINES_DIR/schema-engine-darwin"
          CLIENT_DIR="$(find autobyteus-web/resources/server/node_modules -maxdepth 10 -type d -path '*/node_modules/.prisma/client' | head -n1)"
          test -n "$CLIENT_DIR"
          echo "Prisma client dir: $CLIENT_DIR"
          test -f "$CLIENT_DIR/libquery_engine-darwin.dylib.node"

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            autobyteus-web/electron-dist/*macos-x64*.dmg
            autobyteus-web/electron-dist/*macos-x64*.dmg.blockmap
            autobyteus-web/electron-dist/*macos-x64*.zip
            autobyteus-web/electron-dist/*macos-x64*.zip.blockmap
            autobyteus-web/electron-dist/latest-mac.yml
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    needs: prepare-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Electron Linux x64
        working-directory: autobyteus-web
        env:
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
        run: pnpm build:electron:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            autobyteus-web/electron-dist/*.AppImage
            autobyteus-web/electron-dist/*.AppImage.blockmap
            autobyteus-web/electron-dist/latest-linux.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    needs: prepare-release
    runs-on: windows-2022
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python setuptools for node-gyp
        run: python -m pip install --user --upgrade setuptools

      - name: Build Electron Windows x64
        working-directory: autobyteus-web
        env:
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
        run: pnpm build:electron:windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            autobyteus-web/electron-dist/*windows-*.exe
            autobyteus-web/electron-dist/latest.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_release == 'true' &&
       github.event.inputs.release_tag != '')
    needs:
      - prepare-release
      - build-macos-arm64
      - build-macos-x64
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Merge macOS updater metadata
        run: |
          python3 scripts/merge_latest_mac_metadata.py \
            --arm64 release-artifacts/macos-arm64/latest-mac.yml \
            --x64 release-artifacts/macos-x64/latest-mac.yml \
            --output release-artifacts/latest-mac.yml

      - name: Validate merged macOS updater metadata
        run: |
          test -f release-artifacts/latest-mac.yml
          grep -Eq 'macos-arm64.*\.zip' release-artifacts/latest-mac.yml
          grep -Eq 'macos-x64.*\.zip' release-artifacts/latest-mac.yml

      - name: Resolve release notes mode
        id: release_notes
        run: |
          CURATED_PATH=".github/release-notes/release-notes.md"
          if [[ -f "$CURATED_PATH" ]] && grep -Eq '\S' "$CURATED_PATH"; then
            echo "has_curated_notes=true" >> "$GITHUB_OUTPUT"
            echo "release_notes_path=$CURATED_PATH" >> "$GITHUB_OUTPUT"
            {
              echo "### Release notes mode"
              echo ""
              echo "Using curated release notes from \`$CURATED_PATH\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_curated_notes=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Release notes mode"
              echo ""
              echo "Curated release notes file missing in the tagged revision; falling back to generated GitHub notes."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish release assets with curated notes
        if: ${{ steps.release_notes.outputs.has_curated_notes == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          body_path: ${{ steps.release_notes.outputs.release_notes_path }}
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/*.zip
            release-artifacts/**/*.zip.blockmap
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
            release-artifacts/**/latest-linux.yml
            release-artifacts/latest-mac.yml
            release-artifacts/**/latest.yml

      - name: Publish release assets with generated notes fallback
        if: ${{ steps.release_notes.outputs.has_curated_notes != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/*.zip
            release-artifacts/**/*.zip.blockmap
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
            release-artifacts/**/latest-linux.yml
            release-artifacts/latest-mac.yml
            release-artifacts/**/latest.yml

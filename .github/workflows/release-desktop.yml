name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to GitHub Releases"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish/update when publish_release is enabled (example: v1.1.11-rc1)"
        required: false
        type: string
      prerelease:
        description: "Mark manual-dispatch release as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python setuptools for node-gyp
        run: python3 -m pip install --user --break-system-packages --upgrade setuptools

      - name: Build Electron macOS ARM64
        working-directory: autobyteus-web
        env:
          NO_TIMESTAMP: "1"
          APPLE_TEAM_ID: ""
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
        run: pnpm build:electron:mac -- --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            autobyteus-web/electron-dist/*.dmg
            autobyteus-web/electron-dist/*.dmg.blockmap
            autobyteus-web/electron-dist/latest-mac.yml
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS Intel x64
    runs-on: macos-14
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python setuptools for node-gyp
        run: python3 -m pip install --user --break-system-packages --upgrade setuptools

      - name: Build Electron macOS Intel x64
        working-directory: autobyteus-web
        env:
          NO_TIMESTAMP: "1"
          APPLE_TEAM_ID: ""
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
        run: pnpm build:electron:mac -- --x64

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            autobyteus-web/electron-dist/*macos-x64*.dmg
            autobyteus-web/electron-dist/*macos-x64*.dmg.blockmap
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workspace + submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Electron Linux x64
        working-directory: autobyteus-web
        env:
          AUTOBYTEUS_BUILD_FLAVOR: "personal"
        run: pnpm build:electron:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            autobyteus-web/electron-dist/*.AppImage
            autobyteus-web/electron-dist/*.AppImage.blockmap
            autobyteus-web/electron-dist/latest-linux.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_release == 'true' &&
       github.event.inputs.release_tag != '')
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: release_meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
            release-artifacts/**/latest-*.yml

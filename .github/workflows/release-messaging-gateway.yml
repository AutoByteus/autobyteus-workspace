name: Release Messaging Gateway

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to GitHub Releases"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish/update when publish_release is enabled (example: v0.1.0-rc1)"
        required: false
        type: string
      release_ref:
        description: "Git ref to build from during manual dispatch (branch, tag, or SHA). Defaults to release_tag when omitted."
        required: false
        type: string
      prerelease:
        description: "Mark manual-dispatch release as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: messaging-gateway-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      enforce_version: ${{ steps.meta.outputs.enforce_version }}
      release_sha: ${{ steps.sha.outputs.release_sha }}
    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_REF="${GITHUB_REF_NAME}"
            ENFORCE_VERSION="true"
            PRERELEASE="false"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            if [[ -n "${{ github.event.inputs.release_ref }}" ]]; then
              RELEASE_REF="${{ github.event.inputs.release_ref }}"
            else
              RELEASE_REF="${{ github.event.inputs.release_tag }}"
            fi
            ENFORCE_VERSION="true"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            RELEASE_TAG=""
            RELEASE_REF="${GITHUB_REF_NAME}"
            ENFORCE_VERSION="false"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "enforce_version=$ENFORCE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.release_ref }}
          fetch-depth: 0

      - name: Validate workspace package versions match release tag
        if: ${{ steps.meta.outputs.enforce_version == 'true' }}
        run: |
          TAG_VERSION="${{ steps.meta.outputs.release_tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          DESKTOP_VERSION="$(grep -m1 '"version"' autobyteus-web/package.json | sed -E 's/.*\"version\": \"([^\"]+)\".*/\1/')"
          GATEWAY_VERSION="$(grep -m1 '"version"' autobyteus-message-gateway/package.json | sed -E 's/.*\"version\": \"([^\"]+)\".*/\1/')"
          echo "Release tag version: $TAG_VERSION"
          echo "Desktop package version: $DESKTOP_VERSION"
          echo "Gateway package version: $GATEWAY_VERSION"
          if [[ "$DESKTOP_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::autobyteus-web/package.json version ($DESKTOP_VERSION) must match release tag ($TAG_VERSION)."
            exit 1
          fi
          if [[ "$GATEWAY_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::autobyteus-message-gateway/package.json version ($GATEWAY_VERSION) must match release tag ($TAG_VERSION)."
            exit 1
          fi

      - name: Validate bundled managed messaging manifest matches release tag
        if: ${{ steps.meta.outputs.enforce_version == 'true' }}
        run: |
          node autobyteus-message-gateway/scripts/build-runtime-package.mjs \
            --check-release-manifest \
            --release-tag "${{ steps.meta.outputs.release_tag }}"

      - name: Resolve release commit SHA
        id: sha
        run: |
          RELEASE_SHA="$(git rev-list -n 1 "${{ steps.meta.outputs.release_ref }}")"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

  build-runtime-package:
    name: Build Runtime Package
    needs: prepare-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build gateway runtime package
        run: >-
          node autobyteus-message-gateway/scripts/build-runtime-package.mjs
          --release-tag "${{ needs.prepare-release.outputs.release_tag }}"

      - name: Upload runtime package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: messaging-gateway-runtime
          path: |
            autobyteus-message-gateway/dist-runtime/*.tar.gz
            autobyteus-message-gateway/dist-runtime/*.tar.gz.json
            autobyteus-message-gateway/dist-runtime/*.tar.gz.sha256
            autobyteus-message-gateway/dist-runtime/release-manifest.json
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_release == 'true' &&
       github.event.inputs.release_tag != '')
    needs:
      - prepare-release
      - build-runtime-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Download runtime package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release notes mode
        id: release_notes
        run: |
          CURATED_PATH=".github/release-notes/release-notes.md"
          if [[ -f "$CURATED_PATH" ]] && grep -Eq '\S' "$CURATED_PATH"; then
            echo "has_curated_notes=true" >> "$GITHUB_OUTPUT"
            echo "release_notes_path=$CURATED_PATH" >> "$GITHUB_OUTPUT"
            {
              echo "### Release notes mode"
              echo ""
              echo "Using curated release notes from \`$CURATED_PATH\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_curated_notes=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Release notes mode"
              echo ""
              echo "Curated release notes file missing in the tagged revision; falling back to generated GitHub notes."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish release assets with curated notes
        if: ${{ steps.release_notes.outputs.has_curated_notes == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          body_path: ${{ steps.release_notes.outputs.release_notes_path }}
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.tar.gz.json
            release-artifacts/**/*.tar.gz.sha256
            release-artifacts/**/release-manifest.json

      - name: Publish release assets with generated notes fallback
        if: ${{ steps.release_notes.outputs.has_curated_notes != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.tar.gz.json
            release-artifacts/**/*.tar.gz.sha256
            release-artifacts/**/release-manifest.json
